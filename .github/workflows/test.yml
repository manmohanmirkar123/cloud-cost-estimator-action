name: Test Cloud Cost Estimator
on: [workflow_dispatch, push]

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ secrets.INFRACOST_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Cost Estimation
        id: cost
        uses: ./
        with:
          iac-path: examples/terraform-aws
          provider: aws
          infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}
          comment-on-pr: 'false'
          upload-report-artifact: 'true'
      - name: Show Results
        run: |
          echo "Total Monthly Cost: ${{ steps.cost.outputs.total-monthly-cost }} USD"
          cat ${{ steps.cost.outputs.report }}
          ls -la examples/terraform-aws/*.txt examples/terraform-aws/*.json || true
